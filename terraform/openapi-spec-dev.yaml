openapi: 3.0.0
info:
  title: (π)NAD API - Development
  version: 6.0.0-dev
  description: API REST para (π)NAD - Entorno de Desarrollo

servers:
  - url: http://localhost:5000
    description: Local Development Server

paths:
  /api/v1/health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  version:
                    type: string
                    example: 6.0.0-dev

  /api/v1/auth/login:
    post:
      summary: Iniciar sesión
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        type: object

  /api/v1/documents:
    get:
      summary: Listar documentos
      operationId: listDocuments
      responses:
        '200':
          description: Lista de documentos
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      documents:
                        type: array
                        items:
                          type: object

    post:
      summary: Cargar documento
      operationId: uploadDocument
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Documento cargado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
